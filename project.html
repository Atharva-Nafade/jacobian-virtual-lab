<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Labs - Jacobian of Matrix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #2c3e50, #1a2530);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .content {
            padding: 40px;
        }

        .content-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .aim-sections {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .section-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .section-card:hover {
            transform: translateY(-5px);
            border: 2px solid #3498db;
        }

        .section-card i {
            font-size: 35px;
            color: #3498db;
            margin-bottom: 15px;
        }

        footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

<header>
    <h1>Virtual Labs</h1>
</header>

<main class="content">

    <div class="content-header">
        <h2>A Virtual Lab on Jacobian of Matrix</h2>
        <p>Engineering Mathematics Experiment</p>
    </div>

    <div class="aim-sections">

        <a href="aim.html" style="text-decoration:none; color:inherit;">
            <div class="section-card">
                <i class="fas fa-bullseye"></i>
                <h3>Aim</h3>
                <p>Objective of the experiment</p>
            </div>
        </a>

        <div class="section-card">
            <i class="fas fa-book"></i>
            <h3>Theory</h3>
            <p>Background concepts</p>
        </div>

        <div class="section-card">
            <i class="fas fa-question-circle"></i>
            <h3>Pretest</h3>
            <p>Pre-experiment assessment</p>
        </div>

        <div class="section-card">
            <i class="fas fa-desktop"></i>
            <h3>Simulation</h3>
            <p>Interactive simulation</p>
        </div>

    </div>

</main>

<footer>
    <p>Virtual Labs © 2026 | Jacobian of Matrix</p>
</footer>

</body>
</html>
