<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Feedback - Jacobian Virtual Lab</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}
:root{
    --primary:#2563eb;
    --primary-dark:#1e3a8a;
    --secondary:#06b6d4;
    --accent:#f59e0b;
    --success:#16a34a;
    --danger:#dc2626;
    --dark:#0f172a;
    --text:#334155;
    --muted:#64748b;
}
body{
    min-height:100vh;
    background:
        radial-gradient(circle at top left, rgba(37,99,235,0.20), transparent 34%),
        radial-gradient(circle at top right, rgba(6,182,212,0.18), transparent 28%),
        linear-gradient(135deg,#eef6ff 0%,#f8fafc 45%,#edf7ff 100%);
    color:var(--text);
    line-height:1.7;
}
header{
    position:relative;
    overflow:hidden;
    background:linear-gradient(135deg,#0f172a,#1e3a8a 55%,#0891b2);
    color:white;
    text-align:center;
    padding:38px 20px 75px;
    box-shadow:0 18px 35px rgba(15,23,42,0.20);
}
header::before{
    content:"";
    position:absolute;
    width:360px;
    height:360px;
    border-radius:50%;
    background:rgba(255,255,255,0.10);
    top:-180px;
    left:-120px;
}
header::after{
    content:"∂(u,v) / ∂(x,y)";
    position:absolute;
    right:35px;
    bottom:18px;
    font-size:42px;
    font-weight:800;
    letter-spacing:1px;
    color:rgba(255,255,255,0.10);
}
header h1{
    position:relative;
    font-size:38px;
    letter-spacing:0.8px;
    margin-bottom:8px;
}
header p{
    position:relative;
    font-size:17px;
    opacity:0.92;
}
.container{
    max-width:1000px;
    margin:-45px auto 35px;
    padding:20px;
    position:relative;
    z-index:2;
}
.feedback-box{
    background:rgba(255,255,255,0.92);
    backdrop-filter:blur(10px);
    padding:34px;
    border-radius:28px;
    box-shadow:0 22px 60px rgba(15,23,42,0.16);
    border:1px solid rgba(255,255,255,0.75);
}
h2{
    text-align:center;
    color:var(--dark);
    margin-bottom:18px;
    font-size:31px;
}
h2::after{
    content:"";
    display:block;
    width:85px;
    height:4px;
    background:linear-gradient(90deg,var(--primary),var(--secondary));
    border-radius:10px;
    margin:12px auto 0;
}
.intro{
    text-align:center;
    margin-bottom:34px;
    color:var(--muted);
    font-size:16.5px;
}
.rating-section,.comment-section{
    position:relative;
    background:linear-gradient(145deg,#ffffff 0%,#f8fbff 100%);
    padding:24px;
    margin-bottom:25px;
    border-radius:24px;
    border:1px solid rgba(148,163,184,0.32);
    box-shadow:0 14px 30px rgba(15,23,42,0.075);
    overflow:hidden;
}
.rating-section::before,.comment-section::before{
    content:"";
    position:absolute;
    inset:0 auto 0 0;
    width:7px;
    background:linear-gradient(180deg,var(--primary),var(--secondary));
}
.rating-section h3,.comment-section h3{
    margin-bottom:15px;
    color:var(--primary-dark);
    font-size:22px;
}
.star-rating{
    font-size:48px;
    color:#cbd5e1;
    cursor:pointer;
    user-select:none;
    letter-spacing:5px;
}
.star{
    display:inline-block;
    transition:0.22s;
    text-shadow:0 6px 16px rgba(15,23,42,0.08);
}
.star.active{
    color:var(--accent);
}
.star:hover{
    transform:translateY(-4px) scale(1.08);
}
textarea{
    width:100%;
    height:180px;
    padding:17px;
    border:1px solid #dbe4ef;
    border-radius:18px;
    font-size:16px;
    resize:none;
    outline:none;
    background:rgba(255,255,255,0.95);
    color:var(--text);
    box-shadow:inset 0 4px 12px rgba(15,23,42,0.035);
    transition:0.25s;
}
textarea:focus{
    border-color:#93c5fd;
    box-shadow:0 0 0 4px rgba(37,99,235,0.10);
}
.submit-btn{
    width:100%;
    padding:15px 22px;
    border:none;
    border-radius:16px;
    cursor:pointer;
    font-size:17px;
    font-weight:700;
    color:white;
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    box-shadow:0 12px 26px rgba(37,99,235,0.28);
    transition:0.25s;
}
.submit-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 16px 32px rgba(37,99,235,0.35);
}
#message{
    margin-top:22px;
    text-align:center;
    font-size:18px;
    font-weight:800;
    padding:14px;
    border-radius:16px;
}
#message.success{
    color:#166534;
    background:#ecfdf5;
    border:1px solid #bbf7d0;
}
#message.error-msg{
    color:#991b1b;
    background:#fff1f2;
    border:1px solid #fecdd3;
}
.back-btn{
    display:inline-block;
    margin-top:28px;
    padding:13px 22px;
    background:linear-gradient(135deg,#0f172a,#334155);
    color:white;
    text-decoration:none;
    border-radius:15px;
    font-weight:700;
    box-shadow:0 10px 24px rgba(15,23,42,0.20);
    transition:0.25s;
}
.back-btn:hover{
    transform:translateY(-3px);
}
footer{
    text-align:center;
    padding:24px 20px;
    color:var(--muted);
}
footer p{
    color:var(--muted);
}
@media(max-width:700px){
    header{
        padding:30px 15px 65px;
    }
    header h1{
        font-size:30px;
    }
    header::after{
        font-size:25px;
        right:15px;
    }
    .container{
        margin:-40px auto 25px;
        padding:14px;
    }
    .feedback-box{
        padding:22px;
        border-radius:22px;
    }
    h2{
        font-size:26px;
    }
    .star-rating{
        font-size:39px;
        letter-spacing:2px;
    }
}

</style>
</head>

<body>

<header>
    <h1>Virtual Labs</h1>
    <p>Feedback - Jacobian Matrix and Determinant</p>
</header>

<div class="container">

    <div class="feedback-box">

        <h2>Share Your Feedback</h2>

        <p class="intro">
            Your feedback helps us improve this virtual lab.
            Please rate your experience and share your thoughts below.
        </p>

        <!-- Rating Section -->

        <div class="rating-section">

            <h3>Rate this experiment:</h3>

            <div class="star-rating">

                <span class="star" onclick="rateStar(1)">★</span>
                <span class="star" onclick="rateStar(2)">★</span>
                <span class="star" onclick="rateStar(3)">★</span>
                <span class="star" onclick="rateStar(4)">★</span>
                <span class="star" onclick="rateStar(5)">★</span>

            </div>

        </div>

        <!-- Comments -->

        <div class="comment-section">

            <h3>Your comments:</h3>

            <textarea id="feedbackText" placeholder="Write your feedback here..."></textarea>

        </div>

        <!-- Submit Button -->

        <button class="submit-btn" onclick="submitFeedback()">
            <i class="fas fa-paper-plane"></i>
            Submit Feedback
        </button>

        <div id="message"></div>

        <!-- Back Button -->

        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i>
            Back to Home
        </a>

    </div>

</div>

<footer>
    <p>Virtual Labs © 2026 | Feedback</p>
</footer>

<script>

function rateStar(rating){

    let stars = document.querySelectorAll(".star");

    stars.forEach((star,index)=>{

        if(index < rating){
            star.classList.add("active");
        }
        else{
            star.classList.remove("active");
        }

    });

}

function submitFeedback(){

    const messageBox = document.getElementById("message");

    messageBox.className = "success";
    messageBox.innerHTML = "Thank you for your feedback!";

}

</script>

</body>
</html>
